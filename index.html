<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Assistant - AI Powered</title>
    <!--External Dependencies-->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-white shadow-lg flex flex-col">
            <div class="p-6 border-b">
                <h1 class="text-2xl font-bold text-indigo-600">
                    <i class="fas fa-chart-line"></i> SEFP
                </h1>
                <p class="text-xs text-gray-500 mt-1">Smart Assistant</p>
            </div>
            
            <nav class="flex-1 p-4">
                <div class="space-y-2">
                    <button onclick="showSection('dashboard')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-indigo-50 transition-colors flex items-center space-x-3 text-gray-700">
                        <i class="fas fa-tachometer-alt w-5"></i>
                        <span>Dashboard</span>
                    </button>
                    <button onclick="showSection('deals')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-indigo-50 transition-colors flex items-center space-x-3 text-gray-700">
                        <i class="fas fa-handshake w-5"></i>
                        <span>Deals</span>
                    </button>
                    <button onclick="showSection('accounts')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-indigo-50 transition-colors flex items-center space-x-3 text-gray-700">
                        <i class="fas fa-building w-5"></i>
                        <span>Accounts</span>
                    </button>
                    <button onclick="showSection('targets')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-indigo-50 transition-colors flex items-center space-x-3 text-gray-700">
                        <i class="fas fa-bullseye w-5"></i>
                        <span>Targets</span>
                    </button>
                </div>
            </nav>
            
            <div class="p-4 border-t">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center">
                        <i class="fas fa-user text-white text-sm"></i>
                    </div>
                    <div>
                        <p class="text-sm font-medium">John Smith</p>
                        <p class="text-xs text-gray-500">Sales Rep</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <div class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800" id="section-title">Dashboard</h2>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">
                        <i class="far fa-calendar-alt"></i> 
                        <span id="current-date">dd/mm/yyyy</span>
                    </span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-6" id="content-area">
                <!-- Dynamic content will be loaded here -->
            </div>
        </div>

        <!-- AI Assistant Sidebar (Interface separated from logic) -->
        <div class="w-96 bg-white shadow-xl flex flex-col border-l">
            <div class="p-4 bg-indigo-600 text-white">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-robot text-2xl"></i>
                    <div>
                        <h3 class="font-semibold">AI Assistant</h3>
                        <p class="text-xs text-indigo-200">Ask anything about your data</p>
                    </div>
                </div>
            </div>

            <!-- Chat Messages -->
            <div class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide" id="chat-messages">
                <!-- Initial welcome message (Rendered via JS for ease of use) -->
            </div>

            <!-- Chat Input -->
            <div class="p-4 border-t">
                <div class="flex space-x-2">
                    <input type="text" id="chat-input" placeholder="Ask a question..." 
                           class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <button id="send-chat-btn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="mt-2 flex space-x-2">
                    <button data-quick="total sales" class="quick-btn text-xs px-2 py-1 bg-gray-100 rounded hover:bg-gray-200">Total sales</button>
                    <button data-quick="deals by stage" class="quick-btn text-xs px-2 py-1 bg-gray-100 rounded hover:bg-gray-200">Deals by stage</button>
                    <button data-quick="top accounts" class="quick-btn text-xs px-2 py-1 bg-gray-100 rounded hover:bg-gray-200">Top accounts</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- CRM Data and Logic -->
    <script src="app.js"></script>
    <!-- Chatbot Logic (Simulation) - REPLACE WITH REAL IMPLEMENTATION -->
    <script src="chatbot.js"></script>
</body>
</html>
